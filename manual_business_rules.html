<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Think4Ever Dev - Business Rules</title>
    <link href="css/theme.css" rel="stylesheet" type="text/css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="assets/css/global.css" />
    <link rel="stylesheet" href="assets/css/consumer_docs_home.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="assets/js/i18n.js"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: sans-serif;
        background: #f8fafc;
      }

      .modern-header {
        font-family: "Inter", sans-serif;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 64px;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: saturate(180%) blur(20px);
        -webkit-backdrop-filter: saturate(180%) blur(20px);
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        z-index: 300;
        display: flex;
        align-items: center;
        transition: all 0.3s ease;
      }

      .modern-header-inner {
        width: 100%;
        display: flex;
        align-items: center;
        height: 100%;
      }

      .modern-header-logo-plate {
        display: flex;
        align-items: center;
        padding-left: 36px;
        height: 100%;
        box-sizing: border-box;
      }

      .modern-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        text-decoration: none;
      }

      .modern-logo span {
        font-size: 1.05rem;
        font-weight: 700;
        color: #0f172a;
        letter-spacing: -0.04em;
      }

      .modern-header-content {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex: 1;
        padding: 0 40px;
        height: 100%;
      }

      .modern-header-actions {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      @media (max-width: 1024px) {
        .modern-header-logo-plate {
          width: 240px;
          min-width: 240px;
          padding-left: 24px;
        }
      }

      .consumer-docs-layout {
        max-width: 100% !important;
        width: 100% !important;
        margin: 0 !important;
        display: flex !important;
        background: #ffffff;
      }

      .cd-sidebar {
        box-sizing: content-box !important;
        width: 240px !important;
        min-width: 240px !important;
        background: #fcfcfd !important;
        border-right: 1px solid #e2e8f0 !important;
        padding-left: 36px !important;
        padding-right: 24px !important;
        padding-top: 36px !important;
      }

      .cd-main-content {
        max-width: 1000px !important;
        background: #ffffff !important;
        padding-top: 56px !important;
        padding-left: 64px !important;
        padding-right: 64px !important;
        padding-bottom: 100px !important;
      }

      .doc-section {
        margin-top: 24px;
        margin-bottom: 32px;
      }

      .cd-overview-ul {
        margin-top: 16px;
        margin-bottom: 24px;
        padding-left: 24px;
        list-style-type: disc;
      }

      .cd-overview-ul li {
        margin-bottom: 16px;
        font-family: "Inter", sans-serif;
        font-size: 0.95rem;
        color: #475569;
        line-height: 1.6;
      }

      .cd-overview-ul li strong {
        color: #0f172a;
        font-weight: 600;
      }

      .cd-overview-p {
        font-family: "Inter", sans-serif;
        font-size: 1rem;
        color: #475569;
        line-height: 1.7;
        margin-bottom: 16px;
      }

      .demo-img {
        max-width: 100%;
        border-radius: 8px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        border: 1px solid #e2e8f0;
        margin-top: 24px;
        margin-bottom: 40px;
        display: block;
      }
    </style>
  </head>

  <body>
    <div class="consumer-docs-home consumer-getting-started">
      <header class="modern-header" id="consumerHeader"></header>

      <div class="consumer-docs-layout">
        <div id="consumerSidebar"></div>

        <main class="cd-main-content" id="cd-main">
          <h1 class="cd-page-title" data-i18n="dev_br.title">
            6. Business Rules
          </h1>

          <div class="doc-section">
            <p class="cd-overview-p" data-i18n-html="dev_br.intro">
              Business Rules are the "if/then" logic that governs your app's
              behavior, independent of the code.
            </p>

            <ul class="cd-overview-ul">
              <li>
                <strong data-i18n="dev_br.f1_title">Example:</strong>
                <span data-i18n-html="dev_br.f1_desc"
                  >"If a user has a Free tier account, they can only upload 1
                  document per month."</span
                >
              </li>
              <li>
                <strong data-i18n="dev_br.f2_title">Usage:</strong>
                <span data-i18n-html="dev_br.f2_desc"
                  >Centralize the logic that determines how the business
                  operates.</span
                >
              </li>
            </ul>

            <img
              src="assets/images/b-rules.jpg"
              alt="Business Rules Configuration"
              class="demo-img"
            />
          </div>
        </main>
      </div>
    </div>
    <div id="docFooter"></div>
    <script src="assets/js/navigation.js"></script>
    <script src="assets/js/consumer_docs_home.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.I18n) {
          window.I18n.init();
        }
      });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  </body>
</html>
