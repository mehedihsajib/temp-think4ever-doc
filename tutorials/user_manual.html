<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Manual Tutorials | think4ever</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/tutorials.css" />
    <link rel="icon" type="image/png" href="../assets/images/favicon.png" />
  </head>
  <body>
    <div class="tut-page">
      <header class="modern-header" id="consumerHeader"></header>

      <main class="tut-main">
        <section class="tut-hero">
          <div class="tut-container">
            <p class="tut-kicker">Tutorial Library</p>
            <h1>Think4ever Dev Video Tutorials</h1>
            <p>
              A curated, searchable library of all available tutorial videos
              from the think4ever User Manual. Click any card to watch in a
              smooth popup player.
            </p>
            <div class="tut-meta">
              <span id="tutVideoCount"
                ><i class="fa-solid fa-film"></i> 0 videos</span
              >
              <span
                ><i class="fa-solid fa-circle-play"></i> Interactive popup
                playback</span
              >
            </div>
          </div>
        </section>

        <section class="tut-content">
          <div class="tut-container">
            <div class="tut-toolbar">
              <div class="tut-search-wrap">
                <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
                <input
                  id="tutSearchInput"
                  type="search"
                  placeholder="Search tutorial by title or page..."
                  aria-label="Search tutorials"
                />
              </div>
              <a class="tut-link-btn" href="../manual_introduction.html">
                <i class="fa-solid fa-book-open" aria-hidden="true"></i>
                Open Documentation
              </a>
            </div>

            <div id="tutorialGrid" class="tut-grid" aria-live="polite"></div>
          </div>
        </section>
      </main>

      <div id="videoModal" class="tut-modal" aria-hidden="true">
        <div class="tut-modal-backdrop" data-close-modal="true"></div>
        <div
          class="tut-modal-dialog"
          role="dialog"
          aria-modal="true"
          aria-label="Video player"
        >
          <button
            class="tut-modal-close"
            type="button"
            aria-label="Close video"
            data-close-modal="true"
          >
            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
          </button>
          <h2 id="videoModalTitle"></h2>
          <div class="tut-video-frame">
            <iframe
              id="videoPlayerFrame"
              title="Tutorial video"
              src=""
              allow="
                accelerometer;
                autoplay;
                encrypted-media;
                gyroscope;
                picture-in-picture;
                web-share;
              "
              allowfullscreen
            ></iframe>
          </div>
          <a
            id="videoSourceLink"
            class="tut-modal-source-link"
            href="../manual_introduction.html"
          >
          </a>
        </div>
      </div>

      <script src="../assets/js/navigation.js"></script>
      <script src="../assets/js/tutorials_user_manual.js"></script>
    </div>
  </body>
</html>
