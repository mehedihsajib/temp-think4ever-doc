<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="changelog.ui.title">Changelog & Release Notes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/changelog_page.css">
    <style>
        /* Basic reset for preview consistency */
        body { margin: 0; padding: 0; font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="changelog-page">
  <!-- Skip to content -->
  <a href="#changelog-content" class="skip-to-content">Skip to content</a>

  <!-- Header -->
  <header class="modern-header" id="consumerHeader"></header>

  <!-- Main Content -->
  <main class="changelog-main" id="changelog-content" role="main">

    <!-- Hero Section -->
    <section class="changelog-hero">
      <div class="changelog-hero-icon" aria-hidden="true">
        <i class="fa fa-history"></i>
      </div>
      <h1 class="changelog-title" id="cl_title" data-i18n="changelog.ui.title">Changelog & Release Notes</h1>
      <p class="changelog-description" id="cl_description" data-i18n="changelog.ui.description">Track all updates and improvements to MPay Network Wallet</p>
    </section>

    <!-- Filters -->
    <section class="changelog-filters" aria-label="Filter changelog entries">
      <div class="filters-row">
        <span class="filter-label" data-i18n="changelog.ui.filter_wallet">Wallet</span>
        <div class="wallet-filter-dropdown">
          <select id="cl_filter_wallet" class="wallet-filter-select" aria-label="Filter by wallet type">
            <option value="all" data-i18n="changelog.ui.filter_all">All Wallets</option>
            <option value="merchant" data-i18n="changelog.ui.filter_merchant">Merchant Wallet</option>
            <option value="consumer" data-i18n="changelog.ui.filter_consumer">Consumer Wallet</option>
          </select>
        </div>
      </div>
      <div class="filters-row">
        <span class="filter-label" data-i18n="changelog.ui.filter_tags">Tags</span>
        <div class="tag-filters" id="cl_filter_tag" role="group" aria-label="Filter by change type">
          <button class="tag-filter-btn" data-tag="new-feature" aria-pressed="false">
            <i class="fa fa-star" aria-hidden="true"></i> <span data-i18n="changelog.ui.tag_new_feature">New Feature</span>
          </button>
          <button class="tag-filter-btn" data-tag="bug-fix" aria-pressed="false">
            <i class="fa fa-bug" aria-hidden="true"></i> <span data-i18n="changelog.ui.tag_bug_fix">Bug Fix</span>
          </button>
          <button class="tag-filter-btn" data-tag="improvement" aria-pressed="false">
            <i class="fa fa-arrow-up" aria-hidden="true"></i> <span data-i18n="changelog.ui.tag_improvement">Improvement</span>
          </button>
          <button class="tag-filter-btn" data-tag="breaking-change" aria-pressed="false">
            <i class="fa fa-exclamation-triangle" aria-hidden="true"></i> <span data-i18n="changelog.ui.tag_breaking_change">Breaking Change</span>
          </button>
          <button class="tag-filter-btn" data-tag="security" aria-pressed="false">
            <i class="fa fa-shield" aria-hidden="true"></i> <span data-i18n="changelog.ui.tag_security">Security</span>
          </button>
        </div>
      </div>
      <div class="active-filters hidden" id="cl_active_filters">
        <span class="active-filter-label" data-i18n="changelog.ui.filters_active">Filters active</span>
        <button class="clear-filters-btn" id="cl_clear_filters" aria-label="Clear all filters">
          <i class="fa fa-times" aria-hidden="true"></i> <span data-i18n="changelog.ui.clear_all">Clear all</span>
        </button>
      </div>
    </section>

    <!-- Results Count -->
    <div class="results-count" id="cl_results_count" aria-live="polite">
      Showing <strong>8 releases</strong>
    </div>

    <!-- Timeline -->
    <section class="changelog-timeline" aria-label="Release timeline">
      <div class="timeline-line" aria-hidden="true"></div>
      <div id="cl_entry_list" role="list">
        <!-- Entries rendered by JS -->
      </div>

      <!-- Empty State -->
      <div class="changelog-empty hidden" id="cl_empty_state">
        <div class="empty-icon" aria-hidden="true">
          <i class="fa fa-search"></i>
        </div>
        <h3 class="empty-title" data-i18n="changelog.ui.empty_title">No releases found</h3>
        <p class="empty-text" data-i18n="changelog.ui.empty_text">Try adjusting your filters to see more results.</p>
        <button class="empty-reset-btn" id="cl_empty_reset" data-i18n="changelog.ui.empty_reset">Reset Filters</button>
      </div>
    </section>

    <!-- Back to Home -->
    <div class="changelog-actions">
      <button class="back-home-btn" id="cl_back_home" onclick="load_page('index')" aria-label="Return to landing page">
        <i class="fa fa-arrow-left" aria-hidden="true"></i> <span data-i18n="changelog.ui.back_home">Back to Home</span>
      </button>
    </div>
  </main>



  <!-- Scroll to Top -->
  <!-- <button class="scroll-to-top" id="scroll_to_top" aria-label="Scroll to top" data-i18n-attr="aria-label:changelog.ui.scroll_top">
    <i class="fa fa-chevron-up" aria-hidden="true"></i>
  </button> -->
</div>

  <!-- Footer -->
  <div id="docFooter"></div>
    
    <script src="assets/js/i18n.js"></script>
    <script src="assets/js/navigation.js"></script>
    <script src="assets/js/changelog_page.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</body>
</html>
