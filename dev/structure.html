<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Think4ever - Developer</title>
    <link href="../css/theme.css" rel="stylesheet" type="text/css" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/onboarding.css" />
    <link rel="stylesheet" href="../assets/css/dev_doc.css" />

    <link rel="stylesheet" href="../assets/css/consumer_docs_home.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="../assets/js/i18n.js"></script>

</head>

<body>
    <div class="consumer-docs-home consumer-getting-started">
        <!-- Skip to content -->
        <a href="#cd-main" class="sr-only" style="
          position: absolute;
          left: -9999px;
          top: auto;
          width: 1px;
          height: 1px;
          overflow: hidden;
        " onfocus="
          this.style.position = 'static';
          this.style.width = 'auto';
          this.style.height = 'auto';
        " onblur="
          this.style.position = 'absolute';
          this.style.left = '-9999px';
          this.style.width = '1px';
          this.style.height = '1px';
          this.style.overflow = 'hidden';
        ">Skip to main content</a>
        <!-- Site Header -->
        <header class="modern-header" id="consumerHeader"></header>

        <div class="consumer-docs-layout">
            <!-- Mobile sidebar toggle -->
            <button class="cgs-sidebar-toggle" id="cgsSidebarToggle" aria-label="Toggle navigation menu"
                aria-expanded="false">
                <i class="fa fa-bars"></i>
            </button>
            <!-- Sidebar overlay -->
            <div class="cgs-sidebar-overlay" id="cgsSidebarOverlay"></div>
            <!-- Sidebar -->
            <div id="devSidebar"></div>
            <!-- Main Content -->
            <main class="cd-main-content" id="cd-main">
                <!-- Page Title -->
                <h1 class="cd-page-title" id="cdHomeTitle">
                    Structure
                </h1>

                <!-- Overview Section -->
                <section class="cd-overview" id="cdHomeOverview">
                    <p class="cd-overview-text">
                        By clicking 'Structure' button from top right corner you can see and analyze the project
                        structure.
                    </p>
                    <div class="bento-grid" style="margin-top: 30px;">
                        <div class="bento-card">
                            <div class="card-body">
                                <h4 class="h4">Dashboard</h4>
                            </div>
                            <div class="image-wrapper">
                                <img src="../assets/images/dev-doc/13-goto-structure.png" alt="Goto Structure">
                            </div>
                        </div>
                        <div class="bento-card">
                            <div class="card-body">
                                <h4 class="h4">Analyze Structure</h4>
                            </div>
                            <div class="image-wrapper">
                                <img src="../assets/images/dev-doc/12-structure-analyze.png" alt="Analyze Structure">
                            </div>
                        </div>
                    </div>

                    <div class="bento-grid">
                        <div class="bento-card">
                            <div class="card-body">
                                <h4 class="h4">Strucutre Map</h4>
                            </div>
                            <div class="image-wrapper">
                                <img src="../assets/images/dev-doc/12-structure-tree.png" alt="Goto Structure">
                            </div>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>
    <div id="docFooter"></div>
    <script src="../assets/js/navigation.js"></script>
    <script src="../assets/js/consumer_docs_home.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (window.I18n) {
                window.I18n.init();
            }
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</body>

</html>
